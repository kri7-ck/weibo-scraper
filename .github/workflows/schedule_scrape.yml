name: Daily Weibo Hot Search Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 每天北京时间 16:00 运行
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 授予写入仓库的权限
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫
        run: python weibo_daily.py

      - name: 提交更新到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add weibo_hot_history.csv
          git commit -m "自动更新热搜数据 $(date +'%Y-%m-%d')" || echo "无更新"
          git push
