name: Daily Weibo Hot Search Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫
        run: python weibo_daily.py

      - name: 上传数据文件
        uses: actions/upload-artifact@v4
        with:
          name: weibo-hot-data
          path: weibo_hot_history.csv
